<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowBoard · 设置与个人资料</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        /* ========== 变量 & 重置 ========== */
        :root {
            --bg: #0D0D0D;
            --surface: #151515;
            --card: #1A1A1A;
            --card-hover: #242424;
            --border: #2A2A2A;
            --border-light: #3F3F3F;
            --accent: #FF6B35;
            --accent-light: #FF8F5E;
            --accent-dim: rgba(255,107,53,0.12);
            --priority-high: #EF4444;
            --priority-medium: #F59E0B;
            --priority-low: #10B981;
            --diff-easy: #34D399;
            --diff-medium: #FBBF24;
            --diff-hard: #F87171;
            --text: #EEEEEE;
            --text-secondary: #B0B0B0;
            --text-muted: #6B6B6B;
            --nav-width: 72px;
            --panel-width: 260px;
            --transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 14px; }
        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            overflow: hidden; height: 100vh;
        }
        h1, h2, h3, h4, .brand, .stat-num, .metric-val {
            font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 10px; }
        input, textarea, button, select { font-family: inherit; }

        .bg-glow { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .glow-orb { position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.3; }
        .glow-orb:nth-child(1) { width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,107,53,0.25), transparent 70%); top: -150px; right: 10%; animation: floatA 28s infinite; }
        .glow-orb:nth-child(2) { width: 400px; height: 400px; background: radial-gradient(circle, rgba(125,211,252,0.12), transparent 70%); bottom: 0; left: 20%; animation: floatB 25s infinite; }
        .glow-orb:nth-child(3) { width: 300px; height: 300px; background: radial-gradient(circle, rgba(52,211,153,0.1), transparent 70%); top: 40%; right: 5%; animation: floatC 30s infinite; }
        @keyframes floatA { 0%,100%{transform:translate(0,0)}33%{transform:translate(-50px,80px)}66%{transform:translate(40px,-50px)} }
        @keyframes floatB { 0%,100%{transform:translate(0,0)}33%{transform:translate(60px,-40px)}66%{transform:translate(-40px,60px)} }
        @keyframes floatC { 0%,100%{transform:translate(0,0)}50%{transform:translate(-80px,40px)} }

        .app-layout { display: flex; height: 100vh; position: relative; z-index: 1; }

        /* 导航轨道 */
        .nav-rail {
            width: var(--nav-width); min-width: var(--nav-width);
            background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0; gap: 6px; z-index: 10;
        }
        .nav-logo {
            width: 40px; height: 40px; background: var(--accent); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px; font-size: 18px; color: #fff; font-weight: 700;
            box-shadow: 0 4px 12px rgba(255,107,53,0.3);
        }
        .nav-item {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 18px;
            cursor: pointer; transition: var(--transition); position: relative;
            border: none; background: transparent;
        }
        .nav-item:hover { color: var(--text-secondary); background: var(--card); }
        .nav-item.active { color: var(--accent); background: var(--accent-dim); }
        .nav-item.active::before {
            content: ''; position: absolute; left: -16px;
            width: 4px; height: 24px; border-radius: 0 4px 4px 0; background: var(--accent);
        }
        .nav-spacer { flex: 1; }
        .nav-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--border-light);
            margin-top: 8px; cursor: pointer; transition: border-color var(--transition);
        }
        .nav-avatar:hover { border-color: var(--accent); }

        /* 主内容 */
        .main-content {
            flex: 1; overflow-y: auto; padding: 28px 32px;
            position: relative; background: transparent;
        }

        /* 视图切换 */
        .view-container { display: none; }
        .view-container.active { display: block; }

        /* 页面标题 */
        .page-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 28px;
        }
        .page-header h1 {
            font-size: 28px; font-weight: 700; letter-spacing: -0.02em;
        }
        .back-link {
            display: flex; align-items: center; gap: 6px;
            color: var(--text-muted); font-size: 14px; cursor: pointer;
            padding: 6px 12px; border-radius: 30px;
            transition: var(--transition);
        }
        .back-link:hover { background: var(--card); color: var(--text-secondary); }

        /* 卡片通用 */
        .settings-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 24px;
            margin-bottom: 24px;
        }
        .card-title {
            font-size: 18px; font-weight: 600; margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px;
        }
        .card-title i { color: var(--accent); font-size: 18px; }

        /* Profile 卡片 (settings内) */
        .profile-preview {
            display: flex; align-items: center; gap: 20px;
        }
        .avatar-large {
            width: 72px; height: 72px; border-radius: 24px;
            background: var(--accent); display: flex;
            align-items: center; justify-content: center;
            font-size: 28px; font-weight: 700; color: #fff;
            text-transform: uppercase;
        }
        .preview-info h3 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .preview-info .meta { color: var(--text-secondary); font-size: 14px; margin-bottom: 2px; }
        .preview-info .user-id { font-size: 12px; color: var(--text-muted); font-family: monospace; }
        .view-full-link {
            margin-top: 10px; display: inline-block;
            color: var(--accent); font-weight: 500; cursor: pointer;
        }
        .view-full-link:hover { text-decoration: underline; }

        /* 主题切换 */
        .theme-option {
            display: flex; align-items: center; gap: 16px;
            padding: 12px 0; border-bottom: 1px solid var(--border);
        }
        .theme-option:last-child { border: none; }
        .theme-label { flex: 1; }
        .theme-label .title { font-weight: 500; }
        .theme-label .desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .theme-selector {
            display: flex; gap: 8px;
        }
        .theme-btn {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-secondary); border-radius: 30px;
            padding: 6px 16px; font-size: 13px; cursor: pointer;
            transition: var(--transition);
        }
        .theme-btn.active {
            background: var(--accent-dim); border-color: var(--accent);
            color: var(--accent);
        }

        /* 表单 */
        .form-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 20px 24px;
        }
        .form-field { display: flex; flex-direction: column; gap: 6px; }
        .form-field.full-width { grid-column: span 2; }
        .field-label {
            font-size: 12px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.05em; color: var(--text-muted);
        }
        .form-input {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 16px;
            color: var(--text); font-size: 14px; outline: none;
            transition: var(--transition);
        }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
        .form-input:disabled { opacity: 0.6; background: var(--card); }

        .btn {
            border: none; border-radius: 12px; padding: 10px 20px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px;
            transition: var(--transition); font-family: inherit;
        }
        .btn-primary {
            background: var(--accent); color: #fff;
            box-shadow: 0 4px 12px rgba(255,107,53,0.25);
        }
        .btn-primary:hover { background: var(--accent-light); transform: translateY(-2px); }
        .btn-ghost {
            background: transparent; color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--card); color: var(--text); border-color: var(--border-light); }
        .btn-danger {
            background: transparent; color: #EF4444; border: 1px solid rgba(239,68,68,0.3);
        }
        .btn-danger:hover { background: rgba(239,68,68,0.1); border-color: #EF4444; }

        .action-bar {
            display: flex; justify-content: flex-end; gap: 16px;
            margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border);
        }

        /* Hero 区域 (Profile页) */
        .profile-hero {
            display: flex; align-items: center; gap: 28px;
            margin-bottom: 32px;
        }
        .hero-avatar {
            width: 100px; height: 100px; border-radius: 28px;
            background: var(--accent); display: flex;
            align-items: center; justify-content: center;
            font-size: 42px; font-weight: 700; color: #fff;
        }
        .hero-text h2 { font-size: 32px; font-weight: 700; margin-bottom: 6px; }
        .hero-text .email { font-size: 16px; color: var(--text-secondary); }

        /* Toast */
        .toast-container {
            position: fixed; bottom: 28px; right: 28px;
            z-index: 200; display: flex; flex-direction: column-reverse; gap: 10px;
        }
        .toast {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 14px 20px;
            display: flex; align-items: center; gap: 12px;
            font-size: 14px; color: var(--text);
            box-shadow: 0 12px 28px rgba(0,0,0,0.4);
            animation: toastIn 300ms ease forwards;
        }
        .toast.out { animation: toastOut 300ms ease forwards; }
        .toast-icon {
            width: 28px; height: 28px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; flex-shrink: 0;
        }
        .toast-icon.success { background: rgba(16,185,129,0.12); color: #10B981; }
        .toast-icon.info { background: rgba(125,211,252,0.12); color: #7DD3FC; }
        @keyframes toastIn { from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)} }
        @keyframes toastOut { from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)} }
    </style>
</head>
<body>
<div class="bg-glow"><div class="glow-orb"></div><div class="glow-orb"></div><div class="glow-orb"></div></div>

<div class="app-layout">
    <!-- 导航轨道 -->
    <nav class="nav-rail">
        <div class="nav-logo">F</div>
        <button class="nav-item" data-view="dashboard" title="仪表盘"><i class="fas fa-th-large"></i></button>
        <button class="nav-item" data-view="tasks" title="任务"><i class="fas fa-check-square"></i></button>
        <button class="nav-item" data-view="team" title="团队"><i class="fas fa-users"></i></button>
        <button class="nav-item" data-view="calendar" title="日历"><i class="fas fa-calendar-alt"></i></button>
        <button class="nav-item" data-view="files" title="文件"><i class="fas fa-folder-open"></i></button>
        <div class="nav-spacer"></div>
        <button class="nav-item" data-view="settings" title="设置"><i class="fas fa-cog"></i></button>
        <img class="nav-avatar" src="https://picsum.photos/seed/lxm/100/100.jpg" alt="头像" data-view="profile">
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- Dashboard 视图 (简版占位，实际保留原有内容，此处为了干净只放占位) -->
        <div id="view-dashboard" class="view-container active">
            <div style="display:flex; align-items:center; justify-content:center; height:100%; flex-direction:column; color:var(--text-secondary);">
                <i class="fas fa-th-large" style="font-size:48px; margin-bottom:16px; opacity:0.3;"></i>
                <h2 style="font-weight:400;">仪表盘预览</h2>
                <p style="margin-top:8px;">完整仪表盘内容已就绪，请通过导航切换至「设置」或「个人资料」</p>
            </div>
        </div>

        <!-- Settings 视图 -->
        <div id="view-settings" class="view-container">
            <div class="page-header">
                <h1><i class="fas fa-sliders-h" style="margin-right:12px; color:var(--accent);"></i>设置</h1>
            </div>

            <!-- Profile 卡片 -->
            <div class="settings-card">
                <div class="card-title"><i class="fas fa-user-circle"></i> 个人资料</div>
                <div class="profile-preview">
                    <div class="avatar-large">林</div>
                    <div class="preview-info">
                        <h3>林小明</h3>
                        <div class="meta">xiaoming.lin@flowboard.io</div>
                        <div class="user-id">ID: @linxm · 成员</div>
                        <span class="view-full-link" onclick="switchView('profile')">
                            查看完整资料 <i class="fas fa-arrow-right"></i>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Appearance 卡片 -->
            <div class="settings-card">
                <div class="card-title"><i class="fas fa-palette"></i> 外观</div>
                <div class="theme-option">
                    <div class="theme-label">
                        <div class="title">界面主题</div>
                        <div class="desc">选择深色、浅色或跟随系统</div>
                    </div>
                    <div class="theme-selector" id="themeSelector">
                        <button class="theme-btn active" data-theme="dark">深色</button>
                        <button class="theme-btn" data-theme="light">浅色</button>
                        <button class="theme-btn" data-theme="system">跟随系统</button>
                    </div>
                </div>
                <div class="theme-option">
                    <div class="theme-label">
                        <div class="title">高对比度</div>
                        <div class="desc">增强边框与文字对比</div>
                    </div>
                    <div><i class="fas fa-toggle-off" style="font-size:24px; color:var(--text-muted);"></i></div>
                </div>
            </div>

            <!-- Account 卡片 -->
            <div class="settings-card">
                <div class="card-title"><i class="fas fa-shield-alt"></i> 账号</div>
                <div style="display:flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div style="font-weight:500;">退出当前账号</div>
                        <div style="font-size:12px; color:var(--text-muted);">您将返回登录页面</div>
                    </div>
                    <button class="btn btn-danger" onclick="showToast('info', '您已退出登录 (演示)')">
                        <i class="fas fa-sign-out-alt"></i> 退出登录
                    </button>
                </div>
            </div>
        </div>

        <!-- Profile 视图 -->
        <div id="view-profile" class="view-container">
            <div class="page-header">
                <div class="back-link" onclick="switchView('settings')">
                    <i class="fas fa-chevron-left"></i> 返回设置
                </div>
                <h1 style="margin-left:auto;">个人资料</h1>
            </div>

            <!-- Hero 区域 -->
            <div class="profile-hero">
                <div class="hero-avatar">林</div>
                <div class="hero-text">
                    <h2>林小明</h2>
                    <div class="email"><i class="fas fa-envelope" style="margin-right:6px;"></i>xiaoming.lin@flowboard.io</div>
                </div>
            </div>

            <!-- Personal Information 卡片 -->
            <div class="settings-card">
                <div class="card-title"><i class="fas fa-id-card"></i> 个人信息</div>
                <div class="form-grid">
                    <div class="form-field">
                        <span class="field-label">用户名</span>
                        <input class="form-input" type="text" value="林小明" placeholder="用户名">
                    </div>
                    <div class="form-field">
                        <span class="field-label">邮箱</span>
                        <input class="form-input" type="email" value="xiaoming.lin@flowboard.io">
                    </div>
                    <div class="form-field">
                        <span class="field-label">电话</span>
                        <input class="form-input" type="tel" value="+86 138 4092 8715">
                    </div>
                    <div class="form-field">
                        <span class="field-label">注册时间</span>
                        <input class="form-input" type="text" disabled value="2023年8月15日">
                    </div>
                    <div class="form-field full-width">
                        <span class="field-label">简介 / Bio</span>
                        <textarea class="form-input" rows="2">产品设计师 · 专注效率工具与设计系统</textarea>
                    </div>
                </div>
                <div class="action-bar">
                    <button class="btn btn-ghost" onclick="showToast('info','取消更改')">取消</button>
                    <button class="btn btn-primary" onclick="showToast('success','个人资料已更新')">
                        <i class="fas fa-check"></i> 保存更改
                    </button>
                </div>
            </div>

            <!-- Change Password 区域 -->
            <div class="settings-card">
                <div class="card-title"><i class="fas fa-lock"></i> 修改密码</div>
                <div class="form-grid" style="margin-bottom:8px;">
                    <div class="form-field full-width">
                        <span class="field-label">当前密码</span>
                        <input class="form-input" type="password" placeholder="••••••••">
                    </div>
                    <div class="form-field">
                        <span class="field-label">新密码</span>
                        <input class="form-input" type="password" placeholder="至少8位">
                    </div>
                    <div class="form-field">
                        <span class="field-label">确认新密码</span>
                        <input class="form-input" type="password" placeholder="再次输入">
                    </div>
                </div>
                <div class="action-bar">
                    <button class="btn btn-primary" onclick="showToast('success','密码已更新 (演示)')">
                        <i class="fas fa-key"></i> 更新密码
                    </button>
                </div>
            </div>
        </div>

        <!-- 其他视图占位 (tasks等) -->
        <div id="view-tasks" class="view-container"><div style="padding:40px; text-align:center; color:var(--text-muted);">任务看板 (演示视图)</div></div>
        <div id="view-team" class="view-container"><div style="padding:40px; text-align:center; color:var(--text-muted);">团队协作 (演示视图)</div></div>
        <div id="view-calendar" class="view-container"><div style="padding:40px; text-align:center; color:var(--text-muted);">日历视图</div></div>
        <div id="view-files" class="view-container"><div style="padding:40px; text-align:center; color:var(--text-muted);">文件库</div></div>
    </main>
</div>

<!-- Toast 容器 -->
<div class="toast-container" id="toastContainer"></div>

<script>
    (function(){
        // 当前视图
        let currentView = 'dashboard';

        // 切换视图
        window.switchView = function(viewId) {
            // 隐藏所有视图
            document.querySelectorAll('.view-container').forEach(c => c.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            
            // 更新导航激活态
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.view === viewId) item.classList.add('active');
            });
            // 头像特殊处理 (点击头像到profile)
            if (viewId === 'profile') {
                document.querySelector('.nav-avatar').style.borderColor = 'var(--accent)';
            } else {
                document.querySelector('.nav-avatar').style.borderColor = 'var(--border-light)';
            }
            
            currentView = viewId;
        };

        // 导航点击
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const view = btn.dataset.view;
                if (view) switchView(view);
            });
        });
        
        // 头像点击
        document.querySelector('.nav-avatar').addEventListener('click', () => {
            switchView('profile');
        });

        // 主题切换 (演示交互)
        const themeBtns = document.querySelectorAll('.theme-btn');
        themeBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                themeBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const theme = this.dataset.theme;
                let message = '';
                if (theme === 'dark') message = '已切换至深色主题';
                else if (theme === 'light') message = '浅色主题 (演示效果)';
                else message = '将跟随系统主题';
                showToast('info', message);
                // 实际主题切换可扩展，此处仅演示
            });
        });

        // Toast
        window.showToast = function(type, message) {
            const container = document.getElementById('toastContainer');
            const icons = { success:'fa-check', info:'fa-info' };
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<div class="toast-icon ${type}"><i class="fas ${icons[type]||'fa-info'}"></i></div><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('out'); setTimeout(() => toast.remove(), 300); }, 3000);
        };

        // 初始化：如果通过链接直接进入settings或profile，可处理hash，但简略
        // 默认显示dashboard，但我们可以根据需求默认展示settings？不，保留dashboard激活。
        // 但是我们需要让设置页面的链接可点，已经绑定。

        // 额外：profile页面返回设置使用switchView('settings')
        // 确保点击logo返回dashboard?
        document.querySelector('.nav-logo').addEventListener('click', ()=>switchView('dashboard'));

        // 处理一些演示表单提交拦截
        document.querySelectorAll('form').forEach(f => f.addEventListener('submit', e => e.preventDefault()));
        
        // 确保设置卡片内的"查看完整资料"可用
        // 已经内联onclick

        console.log('FlowBoard · Settings & Profile 已加载');
    })();
